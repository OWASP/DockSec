version: '3'
services:
  web:
    image: nginx:latest
    ports:
      - "80:80"
    privileged: true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /:/host
    environment:
      - MYSQL_ROOT_PASSWORD=secret
    network_mode: host
    pid: host
    cap_add:
      - ALL
    security_opt:
      - apparmor:unconfined
