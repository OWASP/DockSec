name: Release DockSec

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 2026.5.22.4). Must match setup.py!'
        required: true
        type: string

jobs:
  create-tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.set_version.outputs.VERSION }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set version output
        id: set_version
        run: echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT

      - name: Verify version matches setup.py
        run: |
          SETUP_VERSION=$(python -c "import re; content=open('setup.py').read(); print(re.search(r'version=\"([^\"]+)\"', content).group(1))")
          INPUT_VERSION="${{ github.event.inputs.version }}"
          echo "setup.py version: $SETUP_VERSION"
          echo "Input version: $INPUT_VERSION"
          if [ "$SETUP_VERSION" != "$INPUT_VERSION" ]; then
            echo "ERROR: Version mismatch!"
            echo "setup.py has version $SETUP_VERSION but you requested to release $INPUT_VERSION"
            echo "Please update setup.py via a Pull Request first."
            exit 1
          fi
          echo "✅ Versions match!"

      - name: Create and push tag
        run: |
          git tag v${{ github.event.inputs.version }}
          git push origin v${{ github.event.inputs.version }}

  publish-pypi:
    needs: create-tag
    runs-on: ubuntu-latest
    environment: pypi-release
    permissions:
      contents: read
      id-token: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        ref: v${{ needs.create-tag.outputs.version }}
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    
    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build twine
    
    - name: Build package
      run: python -m build
    
    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        password: ${{ secrets.PYPI_API_TOKEN }}

  publish-github-release:
    needs: [create-tag, publish-pypi]
    runs-on: ubuntu-latest
    environment: marketplace-release
    permissions:
      contents: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        ref: v${{ needs.create-tag.outputs.version }}
        
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        
    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build
        
    - name: Build package
      run: python -m build
        
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ needs.create-tag.outputs.version }}
        name: Release v${{ needs.create-tag.outputs.version }}
        generate_release_notes: true
        files: |
          dist/*.tar.gz
          dist/*.whl
